kind = "web"
previewPath = "/"
title = "AI Training Server Dashboard"
version = "1.0.0"
id = "artifacts/ai-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20060
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-dashboard run dev"

[services.env]
PORT = "20060"
BASE_PATH = "/"

[services.production]
build = "pnpm --filter @workspace/api-server run build && BASE_PATH=/ pnpm --filter @workspace/ai-dashboard run build"

[services.production.run]
args = ["bash", "scripts/start-production.sh"]

[services.production.run.env]
PORT = "8080"
MODEL_API_PORT = "9878"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
