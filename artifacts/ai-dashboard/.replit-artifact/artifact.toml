kind = "web"
previewPath = "/"
title = "AI Training Server Dashboard"
version = "1.0.0"
id = "artifacts/ai-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-dashboard run dev"

[services.env]
PORT = "3000"
BASE_PATH = "/"

[services.production]
build = "pnpm --filter @workspace/api-server run build && BASE_PATH=/ pnpm --filter @workspace/ai-dashboard run build"
run = "pnpm --filter @workspace/api-server run serve"

[services.production.health.startup]
path = "/api/healthz"
